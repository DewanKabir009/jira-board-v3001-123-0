name: Run Playwright Job

on:
  workflow_dispatch:
    inputs:
      job_payload:
        description: "Validated Playwright job payload JSON"
        required: true
        type: string

concurrency:
  group: playwright-job-${{ github.run_id }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  run:
    name: Execute approved Playwright script
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PLAYWRIGHT_JOB_PAYLOAD: ${{ inputs.job_payload }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Playwright
        run: |
          npm install --no-save --no-package-lock playwright
          npx playwright install chromium

      - name: Run approved script
        run: |
          set +e
          node scripts/run-playwright-job.cjs
          script_exit=$?
          echo "PLAYWRIGHT_SCRIPT_EXIT=${script_exit}" >> "$GITHUB_ENV"
          if [ "$script_exit" -ne 0 ]; then
            echo "::warning::Playwright script completed with exit code ${script_exit}; evidence will still be published for dashboard review."
          fi
          exit 0

      - name: Publish job evidence
        if: always()
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const payload = (() => {
            try { return JSON.parse(process.env.PLAYWRIGHT_JOB_PAYLOAD || "{}"); }
            catch { return {}; }
          })();
          const safeId = (value) => String(value || "")
            .trim()
            .toLowerCase()
            .replace(/[^a-z0-9._-]+/g, "-")
            .replace(/^-+|-+$/g, "")
            .slice(0, 120);
          const jobsRoot = path.join(process.cwd(), "playwright-jobs");
          const marker = path.join(jobsRoot, ".latest-job-id");
          if (!fs.existsSync(marker)) {
            const ticketKey = String(payload.ticketKey || "workflow").trim().toUpperCase();
            const jobId = safeId(payload.jobId || `${ticketKey}-${Date.now().toString(36)}-workflow-failed`);
            const jobDir = path.join(jobsRoot, jobId);
            const publicBase = "https://dewankabir009.github.io/jira-board-v3001-123-0/playwright-jobs";
            const actionsUrl = `${process.env.GITHUB_SERVER_URL || "https://github.com"}/${process.env.GITHUB_REPOSITORY || "DewanKabir009/jira-board-v3001-123-0"}/actions/runs/${process.env.GITHUB_RUN_ID || ""}`;
            const failureReason = "GitHub Actions failed before the Playwright runner created its normal job record.";
            const failureLog = `${failureReason}\nOpen the Actions run for the exact failing setup or publish step.`;
            const summary = {
              schemaVersion: "playwright-job-summary/v1",
              jobId,
              status: "failed",
              message: "Playwright workflow failed.",
              currentStep: "Workflow failure",
              ticketKey,
              scriptId: String(payload.scriptId || "unknown"),
              scriptLabel: "Approved Playwright script",
              environment: String(payload.environment || "unknown"),
              repositorySlug: payload.repositorySlug || process.env.GITHUB_REPOSITORY,
              requestedBy: payload.requestedBy || {},
              requestedAt: new Date().toISOString(),
              startedAt: "",
              completedAt: new Date().toISOString(),
              durationMs: 0,
              actionsUrl,
              statusUrl: `${publicBase}/${jobId}/summary.json`,
              jobUrl: `${publicBase}/${jobId}/`,
              artifacts: [
                { type: "logs", label: "Logs", href: `${publicBase}/${jobId}/logs.txt` }
              ],
              failureReason,
              failureLog
            };
            fs.mkdirSync(jobDir, { recursive: true });
            fs.writeFileSync(marker, jobId);
            fs.writeFileSync(path.join(jobDir, "summary.json"), `${JSON.stringify(summary, null, 2)}\n`);
            fs.writeFileSync(path.join(jobDir, "logs.txt"), `${failureLog}\n`);
            fs.writeFileSync(path.join(jobDir, "index.html"), `<!doctype html><html lang="en"><head><meta charset="utf-8"><title>${jobId} Playwright failure</title><style>body{font-family:system-ui,sans-serif;margin:32px;background:#fff7f7;color:#3b0a18}.card{max-width:860px;border:1px solid #fecdd3;border-radius:12px;background:#fff;padding:24px;box-shadow:0 20px 50px rgba(190,18,60,.12)}a{color:#005fcc;font-weight:800}</style></head><body><main class="card"><p>Playwright job</p><h1>${jobId}</h1><h2>Workflow failed</h2><p>${failureReason}</p><pre>${failureLog}</pre><p><a href="${actionsUrl}">Open Actions run</a></p></main></body></html>`);
          }
          NODE
          job_id="$(node -e 'const fs=require("fs"); const path=require("path"); const marker=path.join("playwright-jobs",".latest-job-id"); process.stdout.write(fs.existsSync(marker)?fs.readFileSync(marker,"utf8").trim():"unknown-job")')"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git restore --worktree --staged "playwright-jobs/.latest-job-id" || true
          git pull --rebase origin "$GITHUB_REF_NAME"
          git add "playwright-jobs/${job_id}"
          git commit -m "Record Playwright job ${job_id}" || echo "No Playwright evidence changes to commit."
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push raced with another publisher; rebasing and retrying (${attempt}/3)."
            git pull --rebase origin "$GITHUB_REF_NAME"
          done
          echo "Unable to publish Playwright evidence after retries."
          exit 1

      - name: Report automation outcome
        if: always()
        run: |
          if [ "${PLAYWRIGHT_SCRIPT_EXIT:-0}" -ne 0 ]; then
            echo "::warning::Automation script reported failure; open the published View Results page for details."
          fi
