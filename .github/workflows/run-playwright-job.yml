name: Run Playwright Job

on:
  workflow_dispatch:
    inputs:
      job_payload:
        description: "Validated Playwright job payload JSON"
        required: true
        type: string

concurrency:
  group: playwright-job-${{ github.run_id }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  run:
    name: Execute approved Playwright script
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PLAYWRIGHT_JOB_PAYLOAD: ${{ inputs.job_payload }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Playwright
        run: |
          npm install --no-save --no-package-lock playwright
          npx playwright install chromium

      - name: Run approved script
        run: |
          set +e
          node scripts/run-playwright-job.cjs
          script_exit=$?
          echo "PLAYWRIGHT_SCRIPT_EXIT=${script_exit}" >> "$GITHUB_ENV"
          if [ "$script_exit" -ne 0 ]; then
            echo "::warning::Playwright script completed with exit code ${script_exit}; evidence will still be published for dashboard review."
          fi
          exit 0

      - name: Publish job evidence
        if: always()
        run: |
          set -euo pipefail
          job_id="$(node -e 'const fs=require("fs"); const path=require("path"); const marker=path.join("playwright-jobs",".latest-job-id"); process.stdout.write(fs.existsSync(marker)?fs.readFileSync(marker,"utf8").trim():"unknown-job")')"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "playwright-jobs/${job_id}" "playwright-jobs/.latest-job-id"
          git commit -m "Record Playwright job ${job_id}" || echo "No Playwright evidence changes to commit."
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push

      - name: Report automation outcome
        if: always()
        run: |
          if [ "${PLAYWRIGHT_SCRIPT_EXIT:-0}" -ne 0 ]; then
            echo "::warning::Automation script reported failure; open the published View Results page for details."
          fi
