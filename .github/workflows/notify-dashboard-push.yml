name: Notify Dashboard Push

on:
  push:
    branches:
      - master
    paths:
      - index.html
      - assets/jira-media/**

jobs:
  notify:
    name: Notify manually published dashboard changes
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Send change notification
        env:
          JIRA_FIX_VERSION: v3001.123.0
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          QA_EMAIL_TO: ${{ secrets.QA_EMAIL_TO }}
          QA_EMAIL_FROM: ${{ secrets.QA_EMAIL_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_REJECT_UNAUTHORIZED: ${{ secrets.SMTP_REJECT_UNAUTHORIZED }}
        run: node scripts/send-refresh-notifications.cjs
