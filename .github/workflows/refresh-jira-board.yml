name: Refresh Jira Board
# v3001.123.0 release board automation

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: refresh-jira-board
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    name: Pull Jira and publish dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      REFRESH_ITERATIONS: 1
      REFRESH_INTERVAL_SECONDS: 300

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull Jira data and publish dashboard
        env:
          JIRA_FIX_VERSION: v3001.123.0
          JIRA_CLOUD_ID: ${{ secrets.JIRA_CLOUD_ID }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_MCP_TOKEN: ${{ secrets.JIRA_MCP_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for iteration in $(seq 1 "$REFRESH_ITERATIONS"); do
            echo "Refresh iteration ${iteration}/${REFRESH_ITERATIONS}"
            git pull --rebase origin "$GITHUB_REF_NAME"
            node scripts/refresh-jira-board-action.cjs

            if [ -z "$(git status --porcelain -- index.html assets/jira-media)" ]; then
              echo "No dashboard or Jira media asset change to commit."
            else
              pulled_at="$(node - <<'NODE'
          const fs = require("fs");
          const html = fs.readFileSync("index.html", "utf8");
          const start = '<script id="jira-data" type="application/json">';
          const end = "</script>";
          const startIndex = html.indexOf(start);
          const endIndex = html.indexOf(end, startIndex);
          const data = JSON.parse(html.slice(startIndex + start.length, endIndex));
          console.log(data.pullDiff?.currentPulledAtDisplay || data.pulledAtDisplay || new Date().toISOString());
          NODE
              )"
              git add index.html assets/jira-media
              git commit -m "Refresh Jira board data ${pulled_at}"
              git push
            fi

            if [ "$iteration" -lt "$REFRESH_ITERATIONS" ]; then
              sleep "$REFRESH_INTERVAL_SECONDS"
            fi
          done
