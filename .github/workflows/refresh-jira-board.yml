name: Refresh Jira Board
# v3001.123.0 release board automation

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: refresh-jira-board
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  refresh:
    name: Pull Jira and publish dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull Jira data
        id: refresh
        env:
          JIRA_FIX_VERSION: v3001.123.0
          JIRA_CLOUD_ID: ${{ secrets.JIRA_CLOUD_ID }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_MCP_TOKEN: ${{ secrets.JIRA_MCP_TOKEN }}
        run: node scripts/refresh-jira-board-action.cjs

      - name: Commit and push dashboard
        if: steps.refresh.outputs.publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Refresh Jira board data ${{ steps.refresh.outputs.pulled_at }}"
          git push
